services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_NAME: "${VITE_APP_NAME:-FI Requirements Workbench}"
        VITE_DEFAULT_TEMPLATE_ID: "${VITE_DEFAULT_TEMPLATE_ID:-business-requirements-v1}"
        VITE_DISCOVERY_WEBHOOK_URL: "${VITE_DISCOVERY_WEBHOOK_URL:-/webhook/discovery-agent}"
        VITE_REVISION_WEBHOOK_URL: "${VITE_REVISION_WEBHOOK_URL:-/webhook/revision-agent}"
    depends_on:
      - n8n
    ports:
      - "3000:80"

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: "${N8N_HOST:-0.0.0.0}"
      N8N_PORT: "${N8N_PORT:-5678}"
      N8N_PROTOCOL: "${N8N_PROTOCOL:-http}"
      WEBHOOK_URL: "${WEBHOOK_URL:-http://localhost:5678/}"
      N8N_EDITOR_BASE_URL: "${N8N_EDITOR_BASE_URL:-http://localhost:5678/}"
      N8N_BASIC_AUTH_ACTIVE: "${N8N_BASIC_AUTH_ACTIVE:-false}"
      N8N_BASIC_AUTH_USER: "${N8N_BASIC_AUTH_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_BASIC_AUTH_PASSWORD:-change-me}"
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-Europe/Berlin}"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
