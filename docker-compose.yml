services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_NAME: "${VITE_APP_NAME:-FI Requirements Workbench}"
        VITE_DEFAULT_TEMPLATE_ID: "${VITE_DEFAULT_TEMPLATE_ID:-business-requirements-v1}"
        VITE_DISCOVERY_WEBHOOK_URL: "${VITE_DISCOVERY_WEBHOOK_URL:-/webhook/discovery-agent}"
        VITE_REVISION_WEBHOOK_URL: "${VITE_REVISION_WEBHOOK_URL:-/webhook/revision-agent}"
        VITE_SESSION_EXPORT_URL_BASE: "${VITE_SESSION_EXPORT_URL_BASE:-/sessions}"
    depends_on:
      - backend
    ports:
      - "3000:80"

  backend:
    build:
      context: ./backend
      args:
        BACKEND_BUILD_ID: "${BACKEND_BUILD_ID:-dev}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data/requirements:/app/data/requirements
    environment:
      BACKEND_BUILD_ID: "${BACKEND_BUILD_ID:-dev}"
      N8N_EXPORT_WEBHOOK_URL: "${N8N_EXPORT_WEBHOOK_URL:-}"
      N8N_EXPORT_WEBHOOK_SECRET: "${N8N_EXPORT_WEBHOOK_SECRET:-}"
      N8N_EXPORT_WEBHOOK_SECRET_HEADER: "${N8N_EXPORT_WEBHOOK_SECRET_HEADER:-secret}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      OPENAI_REASONING_EFFORT: "${OPENAI_REASONING_EFFORT:-low}"
      OPENAI_MAX_OUTPUT_TOKENS_DISCOVERY: "${OPENAI_MAX_OUTPUT_TOKENS_DISCOVERY:-2200}"
      OPENAI_MAX_OUTPUT_TOKENS_REVISION: "${OPENAI_MAX_OUTPUT_TOKENS_REVISION:-3600}"
