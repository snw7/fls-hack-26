services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_NAME: "${VITE_APP_NAME:-FI Requirements Workbench}"
        VITE_DEFAULT_TEMPLATE_ID: "${VITE_DEFAULT_TEMPLATE_ID:-business-requirements-v1}"
        VITE_DISCOVERY_WEBHOOK_URL: "${VITE_DISCOVERY_WEBHOOK_URL:-/webhook/discovery-agent}"
        VITE_REVISION_WEBHOOK_URL: "${VITE_REVISION_WEBHOOK_URL:-/webhook/revision-agent}"
    depends_on:
      - backend
    ports:
      - "3000:80"

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      OPENAI_REASONING_EFFORT: "${OPENAI_REASONING_EFFORT:-low}"
      OPENAI_MAX_OUTPUT_TOKENS_DISCOVERY: "${OPENAI_MAX_OUTPUT_TOKENS_DISCOVERY:-2200}"
      OPENAI_MAX_OUTPUT_TOKENS_REVISION: "${OPENAI_MAX_OUTPUT_TOKENS_REVISION:-3600}"
